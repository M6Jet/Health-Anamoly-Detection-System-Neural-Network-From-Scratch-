<svg viewBox="0 0 1200 860" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#58a6ff"/>
      <stop offset="1" stop-color="#1f6feb"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3fb950"/>
      <stop offset="1" stop-color="#238636"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff9e64"/>
      <stop offset="1" stop-color="#db6d28"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#58a6ff"/>
    </marker>
    <marker id="arrowg" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3fb950"/>
    </marker>
  </defs>

  <rect width="1200" height="860" fill="url(#bg)"/>

  <!-- Title -->
  <text x="60" y="58" fill="#f0f6fc" font-size="30" font-weight="700">Health Anomaly Detection</text>
  <text x="60" y="86" fill="#8b949e" font-size="16">Neural network built from scratch in pure Python, served as a public cloud API</text>
  <line x1="60" y1="104" x2="1140" y2="104" stroke="#30363d" stroke-width="1"/>

  <!-- ============ TRAINING PIPELINE (left/top) ============ -->
  <text x="60" y="148" fill="#58a6ff" font-size="14" font-weight="700" letter-spacing="2">TRAINING PIPELINE  ·  RUNS LOCALLY</text>

  <!-- Data source -->
  <rect x="60" y="168" width="200" height="92" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="76" y="196" fill="#f0f6fc" font-size="15" font-weight="600">UCI Heart Disease</text>
  <text x="76" y="218" fill="#8b949e" font-size="12.5">297 patient records</text>
  <text x="76" y="237" fill="#8b949e" font-size="12.5">13 clinical features</text>
  <text x="76" y="252" fill="#6e7681" font-size="11">processed.cleveland.data</text>

  <!-- Preprocess -->
  <rect x="320" y="168" width="200" height="92" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="336" y="196" fill="#f0f6fc" font-size="15" font-weight="600">Preprocessing</text>
  <text x="336" y="218" fill="#8b949e" font-size="12.5">Clean missing rows</text>
  <text x="336" y="237" fill="#8b949e" font-size="12.5">Min-max normalize</text>
  <text x="336" y="252" fill="#8b949e" font-size="12.5">80 / 20 train-test split</text>

  <!-- Network -->
  <rect x="580" y="168" width="200" height="92" rx="10" fill="#161b22" stroke="url(#accent)" stroke-width="2"/>
  <text x="596" y="196" fill="#f0f6fc" font-size="15" font-weight="600">Neural Network</text>
  <text x="596" y="218" fill="#8b949e" font-size="12.5">13 → 8 → 1 architecture</text>
  <text x="596" y="237" fill="#8b949e" font-size="12.5">121 parameters</text>
  <text x="596" y="252" fill="#8b949e" font-size="12.5">Sigmoid activation</text>

  <!-- Train loop -->
  <rect x="840" y="168" width="200" height="92" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="856" y="196" fill="#f0f6fc" font-size="15" font-weight="600">Training Loop</text>
  <text x="856" y="218" fill="#8b949e" font-size="12.5">Backpropagation</text>
  <text x="856" y="237" fill="#8b949e" font-size="12.5">Gradient descent</text>
  <text x="856" y="252" fill="#8b949e" font-size="12.5">200 epochs · lr 0.1</text>

  <!-- arrows row 1 -->
  <line x1="260" y1="214" x2="318" y2="214" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="520" y1="214" x2="578" y2="214" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="780" y1="214" x2="838" y2="214" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- network internals detail -->
  <rect x="60" y="300" width="980" height="150" rx="10" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>
  <text x="80" y="328" fill="#58a6ff" font-size="13" font-weight="700" letter-spacing="1.5">NETWORK FORWARD PASS  ·  BUILT FROM PURE FUNCTIONS</text>

  <!-- input neurons -->
  <text x="150" y="356" fill="#8b949e" font-size="12" text-anchor="middle">Input layer</text>
  <text x="150" y="372" fill="#6e7681" font-size="11" text-anchor="middle">13 features</text>
  <g fill="#1f6feb">
    <circle cx="150" cy="396" r="7"/>
    <circle cx="150" cy="416" r="7"/>
    <circle cx="150" cy="436" r="7"/>
  </g>
  <text x="150" y="440" fill="#6e7681" font-size="13" text-anchor="middle" dy="2">⋮</text>

  <!-- hidden neurons -->
  <text x="470" y="356" fill="#8b949e" font-size="12" text-anchor="middle">Hidden layer</text>
  <text x="470" y="372" fill="#6e7681" font-size="11" text-anchor="middle">8 neurons · weighted sum + bias → sigmoid</text>
  <g fill="#58a6ff">
    <circle cx="470" cy="392" r="7"/>
    <circle cx="470" cy="412" r="7"/>
    <circle cx="470" cy="432" r="7"/>
  </g>

  <!-- output neuron -->
  <text x="800" y="356" fill="#8b949e" font-size="12" text-anchor="middle">Output</text>
  <text x="800" y="372" fill="#6e7681" font-size="11" text-anchor="middle">1 neuron · probability 0–1</text>
  <circle cx="800" cy="412" r="9" fill="#3fb950"/>

  <!-- connection lines -->
  <g stroke="#21262d" stroke-width="1">
    <line x1="157" y1="396" x2="463" y2="392"/>
    <line x1="157" y1="396" x2="463" y2="412"/>
    <line x1="157" y1="416" x2="463" y2="412"/>
    <line x1="157" y1="436" x2="463" y2="432"/>
    <line x1="157" y1="416" x2="463" y2="432"/>
    <line x1="477" y1="392" x2="791" y2="412"/>
    <line x1="477" y1="412" x2="791" y2="412"/>
    <line x1="477" y1="432" x2="791" y2="412"/>
  </g>
  <text x="930" y="416" fill="#3fb950" font-size="13" font-weight="600">→ NORMAL / ABNORMAL</text>

  <!-- saved artifact -->
  <rect x="840" y="380" width="0" height="0"/>
  <line x1="940" y1="260" x2="940" y2="300" stroke="#58a6ff" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

  <!-- artifact handoff -->
  <rect x="430" y="486" width="340" height="70" rx="10" fill="#161b22" stroke="url(#orange)" stroke-width="2"/>
  <text x="600" y="514" fill="#f0f6fc" font-size="15" font-weight="600" text-anchor="middle">trained_network.json</text>
  <text x="600" y="536" fill="#8b949e" font-size="12.5" text-anchor="middle">Saved weights + normalization params · portable artifact</text>
  <line x1="600" y1="450" x2="600" y2="484" stroke="#db6d28" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- divider -->
  <line x1="60" y1="592" x2="1140" y2="592" stroke="#30363d" stroke-width="1"/>

  <!-- ============ DEPLOYMENT (bottom) ============ -->
  <text x="60" y="628" fill="#3fb950" font-size="14" font-weight="700" letter-spacing="2">DEPLOYMENT  ·  AWS CLOUD  ·  PUBLIC API</text>

  <!-- client -->
  <rect x="60" y="652" width="200" height="100" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="76" y="682" fill="#f0f6fc" font-size="15" font-weight="600">Client</text>
  <text x="76" y="704" fill="#8b949e" font-size="12.5">curl / browser / app</text>
  <text x="76" y="724" fill="#8b949e" font-size="12.5">POST 13 features</text>
  <text x="76" y="742" fill="#6e7681" font-size="11.5">as JSON</text>

  <!-- API gateway -->
  <rect x="340" y="652" width="200" height="100" rx="10" fill="#161b22" stroke="url(#green)" stroke-width="2"/>
  <text x="356" y="682" fill="#f0f6fc" font-size="15" font-weight="600">API Gateway</text>
  <text x="356" y="704" fill="#8b949e" font-size="12.5">HTTP API</text>
  <text x="356" y="724" fill="#8b949e" font-size="12.5">POST /predict</text>
  <text x="356" y="742" fill="#6e7681" font-size="11.5">public endpoint</text>

  <!-- lambda -->
  <rect x="620" y="652" width="220" height="100" rx="10" fill="#161b22" stroke="url(#green)" stroke-width="2"/>
  <text x="636" y="682" fill="#f0f6fc" font-size="15" font-weight="600">AWS Lambda</text>
  <text x="636" y="704" fill="#8b949e" font-size="12.5">lambda_handler.py</text>
  <text x="636" y="724" fill="#8b949e" font-size="12.5">Validate · normalize · predict</text>
  <text x="636" y="742" fill="#6e7681" font-size="11.5">loads weights once per container</text>

  <!-- response -->
  <rect x="920" y="652" width="220" height="100" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="936" y="682" fill="#f0f6fc" font-size="15" font-weight="600">JSON Response</text>
  <text x="936" y="704" fill="#8b949e" font-size="12.5">prediction · label</text>
  <text x="936" y="724" fill="#8b949e" font-size="12.5">risk level · confidence</text>
  <text x="936" y="742" fill="#8b949e" font-size="12.5">top 3 influences</text>

  <!-- deployment arrows -->
  <line x1="260" y1="702" x2="338" y2="702" stroke="#3fb950" stroke-width="2" marker-end="url(#arrowg)"/>
  <line x1="540" y1="702" x2="618" y2="702" stroke="#3fb950" stroke-width="2" marker-end="url(#arrowg)"/>
  <line x1="840" y1="702" x2="918" y2="702" stroke="#3fb950" stroke-width="2" marker-end="url(#arrowg)"/>

  <!-- artifact to lambda link -->
  <path d="M 730 556 L 730 600 L 730 600 Q 730 624 730 652" fill="none" stroke="#db6d28" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#arrowg)"/>
  <text x="744" y="618" fill="#db6d28" font-size="11.5">bundled into deployment</text>

  <!-- footer metrics -->
  <text x="60" y="808" fill="#6e7681" font-size="12.5">Zero ML libraries · 91.6% training accuracy · ~70% test recall · live at /predict</text>
</svg>
